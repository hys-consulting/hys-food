// ─── SYNC ALL PUSH (admin) ────────────────────────────────────────────────────
async function syncPushAll() {
  if (!supa.isConfigured()) {
    toast('Supabase non configuré.', 'error'); return;
  }
  if (!navigator.onLine) {
    toast('Hors-ligne — impossible de synchroniser.', 'warning'); return;
  }
  setSyncStatus('syncing');
  toast('Synchronisation en cours…', 'info');
  let ok = true;
  for (const m of SYNC_MAP) {
    const data = store.get(m.sk);
    if (Array.isArray(data) && data.length > 0) {
      const result = await supa.upsert(m.table, data);
      if (!result) { ok = false; console.warn('[Supa] Push failed:', m.table); }
    }
  }
  const settingsData = store.get(SK.SETTINGS);
  if (settingsData) {
    const result = await supa.upsert('hysfood_settings', [{ id: 'global', data: settingsData, updatedAt: new Date().toISOString() }]);
    if (!result) { ok = false; console.warn('[Supa] Push failed: hysfood_settings'); }
  }
  _lastSync = Date.now();
  setSyncStatus(ok ? 'online' : 'error');
  toast(ok ? '✅ Toutes les données envoyées vers Supabase.' : '⚠️ Certaines tables n\'ont pas pu être synchronisées.', ok ? 'success' : 'warning');
  renderSyncBadge();
}

// ─── INIT SUPABASE ────────────────────────────────────────────────────────────
async function initSupabase() {
  if (!supa.isConfigured()) {
    setSyncStatus('disabled');
    console.log('[Supa] Non configuré — mode local uniquement');
    return;
  }

  // Événements réseau
  window.addEventListener('online', async () => {
    setSyncStatus('syncing');
    await drainSyncQueue();
    await syncPull();
  });
  window.addEventListener('offline', () => {
    setSyncStatus('offline');
  });

  // Pull initial si en ligne
  if (navigator.onLine) {
    const ok = await syncPull();
    if (!ok) setSyncStatus('error');
  } else {
    setSyncStatus('offline');
  }

  // Sync périodique toutes les 3 minutes
  setInterval(async () => {
    if (navigator.onLine && supa.isConfigured()) {
      await syncPull();
    }
  }, 3 * 60 * 1000);
}

let _realtimeChannels = [];

function initSupabaseRealtime() {
  if (!supa.isConfigured() || !navigator.onLine) return;

  // Polling léger toutes les 30s pour les tables critiques
  window._realtimePoll = setInterval(async () => {
    if (!navigator.onLine || !supa.isConfigured()) return;
    const pagesBesoinSync = ['presence-rt', 'conges-admin'];
    if (pagesBesoinSync.includes(currentPage)) {
      const pts = await supa.select('hysfood_pointages', 'limit=200');
      if (pts) { store.set('hysfood_pointages', pts); store.invalidate('hysfood_pointages'); }
      const abs = await supa.select('hysfood_absences', 'statut=eq.en_attente');
      if (abs) {
        const allAbs = store.absences();
        abs.forEach(a => { const i = allAbs.findIndex(x=>x.id===a.id); if(i>=0)allAbs[i]=a; else allAbs.push(a); });
        store.set('hysfood_absences', allAbs);
      }
      // Refresh la page actuelle si données changées
      try { navigateTo(currentPage); } catch(e) {}
    }
    // Notifications
    const notifs = await supa.select('hysfood_notifications', `userId=eq.${currentUser?.id}&lu=eq.false&limit=20`);
    if (notifs && notifs.length > 0) {
      const localNotifs = store.notifs();
      let changed = false;
      notifs.forEach(n => { if (!localNotifs.find(x=>x.id===n.id)) { localNotifs.unshift(n); changed=true; }});
      if (changed) { store.saveNotifs(localNotifs); updateNotifBadge(); }
    }
  }, 30000);

  console.log('[HYS] Realtime polling démarré (30s)');
}

function stopRealtime() {
  if (window._realtimePoll) clearInterval(window._realtimePoll);
  _realtimeChannels.forEach(ch => { try { ch.close(); } catch(e){} });
  _realtimeChannels = [];
}

    .sort((a,b)=>a.date.localeCompare(b.date)||a.timestamp-b.timestamp)
    .forEach(p => {
      const u = store.users().find(x=>x.id===p.userId);
      if(p.type==='entree'){
        const sortie = store.pointages().find(x=>x.userId===p.userId&&x.date===p.date&&x.type==='sortie'&&x.timestamp>p.timestamp);
        const dur    = sortie ? Math.round((sortie.timestamp-p.timestamp)/60000) : 0;
        rows3.push([u?.nom||'', u?.prenom||'', ROLE_LABELS[u?.role]||'', p.date, p.heure.slice(0,5), sortie?sortie.heure.slice(0,5):'', dur||'', p.source||'app', '']);
      }
    });

  // Tout en un seul CSV (séparé par sections)
  const allRows = [...rows1, ...rows2, ...rows3];
  downloadCSV(allRows, `Suivi_Conges_HYS_${today}.csv`);
  store.addAudit({ action:'SYNC_EXCEL_EXPORT', userId:currentUser.id, detail:`Export Excel sync Suivi_Conges ${today}` });
  toast('Export Excel compatible Suivi_Conges téléchargé.','success');
}

// ─── RECHERCHE GLOBALE ────────────────────────────────────────────────────────
let _searchOpen = false;

function openSearch() {
  if (_searchOpen) return;
  _searchOpen = true;
  const overlay = document.createElement('div');
  overlay.id = 'search-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:3000;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;backdrop-filter:blur(6px)';
  overlay.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:580px;box-shadow:var(--shadow-lg);overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border)">
        <span style="font-size:18px;color:var(--text3)">🔍</span>
        <input id="global-search-input" type="text" placeholder="Rechercher un(e) salarié(e)…"
          style="flex:1;border:none;outline:none;font-size:15px;font-family:var(--font);background:transparent;color:var(--text)">
        <kbd style="font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;border:1px solid var(--border)">Esc</kbd>
      </div>
      <div id="search-results" style="max-height:380px;overflow-y:auto;padding:8px 0"></div>
    </div>`;
  document.body.appendChild(overlay);

  const input = document.getElementById('global-search-input');
  input?.focus();

  const close = () => { overlay.remove(); _searchOpen = false; };
  overlay.addEventListener('click', e => { if(e.target===overlay) close(); });

  input?.addEventListener('keydown', e => {
    if(e.key==='Escape') close();
    else if(e.key==='Enter') {
      const first = document.querySelector('.search-result-item');
      if(first) { first.click(); close(); }
    }
  });

  input?.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    const res = document.getElementById('search-results');
    if(!res) return;
    if(q.length < 2) { res.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">Tapez au moins 2 caractères</div>'; return; }

    const results = [];
    // Utilisateurs
    store.users().filter(u=>u.statut==='actif').forEach(u => {
      if(`${esc(u.prenom)} ${esc(u.nom)} ${esc(u.username)} ${u.service||''}`.toLowerCase().includes(q))
        results.push({ type:'user', icon:ROLE_LABELS[u.role]?.split(' ')[0]||'👤', label:`${esc(u.prenom)} ${esc(u.nom)}`, sub:u.service||ROLE_LABELS[u.role]||'', action:()=>navigateTo('utilisateurs') });
    });
    if(results.length === 0) { res.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">Aucun résultat</div>'; return; }
    res.innerHTML = results.slice(0,8).map((r,i) => `
      <div class="search-result-item" data-idx="${i}" style="display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;transition:background .12s"
        onmouseover="this.style.background='var(--hys-green-light)'" onmouseout="this.style.background='transparent'">
        <span style="font-size:18px;flex-shrink:0">${r.icon}</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${r.label}</div>
          <div style="font-size:11px;color:var(--text3)">${r.sub}</div>
        </div>
      </div>`).join('');
    results.slice(0,8).forEach((r,i) => {
      document.querySelector(`.search-result-item[data-idx="${i}"]`)?.addEventListener('click', () => { r.action(); close(); });
    });
  });
  // Trigger initial
  input?.dispatchEvent(new Event('input'));
}

// ─── RACCOURCIS CLAVIER ────────────────────────────────────────────────────────
function initShortcuts() {
  document.addEventListener('keydown', e => {
    if (!currentUser) return;
    // Ctrl+K ou Cmd+K → recherche globale
    if ((e.ctrlKey||e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); return; }
    // Ctrl+/ → aide raccourcis
    if ((e.ctrlKey||e.metaKey) && e.key === '/') { e.preventDefault(); showShortcutsHelp(); return; }
    if (!isAdmin()) return;
    // Alt+P → Présence RT
    if (e.altKey && e.key === 'p') { e.preventDefault(); navigateTo('presence-rt'); }
    // Alt+G → Planning
    if (e.altKey && e.key === 'g') { e.preventDefault(); navigateTo('planning'); }
    // Alt+C → Congés admin
    if (e.altKey && e.key === 'c') { e.preventDefault(); navigateTo('conges-admin'); }
    // Alt+N → Notifications
    if (e.altKey && e.key === 'n') { e.preventDefault(); navigateTo('notifications'); }
  });
}

function showShortcutsHelp() {
  openModal('⌨️ Raccourcis clavier', `
    <div style="display:flex;flex-direction:column;gap:8px">
      ${[
        ['Ctrl + K',  'Recherche globale'],
        ['Ctrl + /',  'Aide raccourcis'],
        ['Alt + P',   'Présence temps réel'],
        ['Alt + G',   'Planning'],
        ['Alt + C',   'Congés & absences'],
        ['Alt + N',   'Notifications'],
        ['Alt + E',   'Pointer Entrée'],
        ['Alt + S',   'Pointer Sortie'],
        ['Echap',     'Fermer modal / recherche'],
      ].map(([key, desc]) => `
      <div style="display:flex;align-items:center;gap:12px;padding:7px 10px;background:var(--bg3);border-radius:var(--radius-xs)">
        <kbd style="background:var(--hys-dark);color:var(--hys-green);padding:3px 9px;border-radius:5px;font-size:12px;font-weight:700;font-family:monospace;white-space:nowrap">${key}</kbd>
        <span style="font-size:13px;color:var(--text2)">${desc}</span>
      </div>`).join('')}
    </div>`,
    [{ label:'Fermer', cls:'btn-ghost', action: closeModal }]);
}

// ─── INITIALISATION ───────────────────────────────────────────────────────────
async function init() {
  await initDefaultData();
  await seedCollabsHYS();
  startClock();
  attachEventListeners();
  await initSupabase();
  restoreSession();
}

async function initDefaultData() {
  const users = store.users();
  if (users.length === 0) {
    const tempPwd = generateTempPassword();
    const hash = await hashPassword(tempPwd);
    store.saveUsers([{
      id: uid(), username: 'admin.hysfood', password: hash,
      prenom: 'Admin', nom: 'HYS FOOD',
      role: ROLES.ADMIN, service: 'Pilotage', statut: 'actif', firstLogin: true, createdAt: now(),
    }]);
    // Paramètres par défaut HYS FOOD
    store.saveSettings({
      organisation: 'HYS FOOD',
      territoire: 'mayotte',
      heureDebut: '10:00',
      heureFin: '22:00',
      pauseDejeIner: 60,
    });
    store.addAudit({ action:'INIT', userId:'system', detail:'HYS FOOD Horodateur v1.0 initialisé — Compte admin créé (admin.hysfood)' });
    console.log(`[HYS FOOD] Compte admin initial créé — identifiant : admin.hysfood / mot de passe temporaire : ${tempPwd}`);
    store.addNotif({ type:'info', message:`Bienvenue sur HYS FOOD ! Identifiant : admin.hysfood — mot de passe temporaire généré aléatoirement (voir la console de ce premier appareil). Changez-le immédiatement à la première connexion.` });
  }
}

function attachEventListeners() {
  document.getElementById('btn-login')?.addEventListener('click', doLogin);
  document.getElementById('login-password')?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('login-username')?.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-password')?.focus(); });
  document.getElementById('toggle-pwd')?.addEventListener('click', () => {
    const p = document.getElementById('login-password'); if(p) p.type = p.type==='password'?'text':'password';
  });
  document.getElementById('btn-changepwd')?.addEventListener('click', doChangePassword);
  document.getElementById('new-pwd')?.addEventListener('input', () => {
    const pwd = document.getElementById('new-pwd')?.value||'';
    const s = evalPasswordStrength(pwd);
    const fill = document.getElementById('pwd-strength-fill'), label = document.getElementById('pwd-strength-label');
    if (fill) { fill.style.width = s.pct+'%'; fill.style.background = s.color; }
    if (label) label.textContent = pwd.length > 0 ? 'Force : '+s.level : '';
  });
  document.getElementById('btn-logout')?.addEventListener('click', doLogout);
  document.getElementById('btn-kiosk')?.addEventListener('click', () => {
    if (isAdmin()) {
      if (confirm('Lancer le mode kiosque ?\nPour quitter : bouton Admin → mot de passe.')) showKiosk();
    } else {
      toast('Accès kiosque réservé à l\'admin.', 'warning');
    }
  });
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  document.getElementById('modal-close-btn')?.addEventListener('click', closeModal);
  document.getElementById('notif-bell-btn')?.addEventListener('click', () => {
    toast(`${store.notifs().filter(n=>!n.lu).length} notification(s) non lue(s).`,'info');
    store.markAllLu(); updateNotifBadge();
  });
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') closeModal();
    if (!currentUser) return;
    if (e.altKey && (currentUser.role === ROLES.COLLAB || currentUser.role === ROLES.ADMIN)) {
      if (e.key==='e') { e.preventDefault(); doPointage('entree'); }
      if (e.key==='s') { e.preventDefault(); doPointage('sortie'); }
    }
  });
  ['mousemove','keydown','touchstart','click'].forEach(ev => {
    document.addEventListener(ev, () => { lastActivity = Date.now(); }, {passive:true});
  });
  setInterval(() => {
    if (currentUser && Date.now()-lastActivity > SESSION_TIMEOUT_MS) { doLogout(); toast('Session expirée.','info'); }
  }, 60000);
}

// ─── DÉMARRAGE ────────────────────────────────────────────────────────────────
if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
