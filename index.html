<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E4392E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HYS FOOD">
<meta name="description" content="HYS FOOD · Horodateur & gestion des congés">
<title>HYS FOOD — Horodateur</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* HYS Brand */
  --hys-green:#E4392E;--hys-green2:#C42A20;--hys-green3:#8F1F17;
  --hys-green-light:#FFF6D9;--hys-green-mid:#FFD966;
  --hys-yellow:#FFC72C;--hys-yellow2:#F4A900;
  --hys-dark:#2a2a2a;--hys-dark2:#3a3a3a;

  /* Light theme */
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#eef2f7;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1a202c;--text2:#4a5568;--text3:#718096;--text4:#a0aec0;

  /* Semantic */
  --accent:var(--hys-green);--accent2:var(--hys-green2);
  --blue:#3b82f6;--blue2:#2563eb;--blue3:#dbeafe;
  --green:var(--hys-green);--green2:var(--hys-green2);--green3:var(--hys-green-light);
  --red:#ef4444;--red2:#dc2626;--red-light:#fee2e2;
  --amber:#f59e0b;--amber2:#d97706;--amber-light:#fef3c7;
  --purple:#8b5cf6;--purple2:#7c3aed;--purple-light:#ede9fe;
  --teal:#0d9488;--teal2:#0f766e;--teal-light:#ccfbf1;

  --card:#ffffff;--card2:#f8fafc;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.08);
  --shadow-lg:0 10px 25px rgba(0,0,0,.1),0 20px 48px rgba(0,0,0,.08);
  --shadow-green:0 4px 20px rgba(228,57,46,.25);
  --radius:14px;--radius-sm:10px;--radius-xs:6px;--radius-pill:100px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --transition:.18s cubic-bezier(.4,0,.2,1);
}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.animate-fade{animation:fadeIn .3s var(--transition) both}
.animate-scale{animation:scaleIn .25s var(--transition) both}

/* ── VIEWS ── */
.view{display:none;min-height:100vh}
.view.active{display:block}
#view-login{display:none;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#FFFBEA 0%,#FFF6D9 40%,#f0f4f8 100%)}
#view-login.active{display:flex}

/* ── LOGIN ── */
.login-box{
  background:var(--card);border-radius:24px;
  padding:48px 44px;width:100%;max-width:460px;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--hys-green-mid);
  animation:scaleIn .4s var(--transition) both;
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--hys-green),var(--hys-yellow));
}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .brand{font-size:28px;font-weight:900;letter-spacing:-.5px;margin-top:12px;color:var(--hys-dark)}
.login-logo .hys-g{color:var(--hys-green)}
.login-logo .sub{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.3px}
.clock-block{text-align:center;margin-bottom:24px;padding:16px;background:var(--hys-green-light);border-radius:var(--radius-sm)}
.clock-display{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--hys-green);letter-spacing:3px;line-height:1}
.date-display{color:var(--text3);font-size:12px;margin-top:4px;text-transform:capitalize;font-weight:500}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.form-control{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 15px;color:var(--text);
  font-size:14px;font-family:var(--font);transition:all var(--transition);outline:none;
}
.form-control:hover{border-color:var(--border2)}
.form-control:focus{
  border-color:var(--hys-green);background:var(--card);
  box-shadow:0 0 0 3px rgba(228,57,46,.12);
}
.form-control option{background:var(--card)}
select.form-control{cursor:pointer}
.input-group{position:relative}
.input-group .form-control{padding-right:44px}
.input-group-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;
  transition:color var(--transition);border-radius:4px}
.input-group-btn:hover{color:var(--hys-green)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 18px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:600;
  font-family:var(--font);cursor:pointer;border:none;
  transition:all var(--transition);white-space:nowrap;text-decoration:none;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;background:rgba(255,255,255,0);
  transition:background var(--transition);
}
.btn:hover::after{background:rgba(255,255,255,.1)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

.btn-primary{background:linear-gradient(135deg,var(--hys-green),var(--hys-green2));color:#fff;box-shadow:var(--shadow-green)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(228,57,46,.35);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 12px rgba(34,197,94,.25)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.2)}
.btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.2)}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.2)}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.btn-ghost::after{display:none}
.btn-outline-green{background:transparent;color:var(--hys-green);border:1.5px solid var(--hys-green-mid)}
.btn-outline-green:hover{background:var(--hys-green-light);border-color:var(--hys-green)}
.btn-outline-green::after{display:none}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}
.btn-lg{padding:14px 24px;font-size:15px;width:100%;justify-content:center}
.btn-icon{padding:8px;width:36px;height:36px;justify-content:center;font-size:16px;border-radius:var(--radius-sm)}
.w-full{width:100%}
.flex{display:flex}.gap-2{gap:8px}.gap-1{gap:4px}

/* ── APP LAYOUT ── */
.app-layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:900px){.app-layout{grid-template-columns:1fr}}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--hys-dark);border-right:none;display:flex;
  flex-direction:column;position:sticky;top:0;height:100vh;
  overflow-y:auto;overflow-x:hidden;
  box-shadow:4px 0 24px rgba(0,0,0,.12);
}
.sidebar-header{
  padding:22px 18px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,rgba(228,57,46,.12) 0%,transparent 100%);
}
.sidebar-brand{display:flex;align-items:center;gap:12px}
.sidebar-brand svg{width:38px;height:38px;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(228,57,46,.4))}
.brand-text .name{font-size:16px;font-weight:900;letter-spacing:-.3px;color:#fff}
.brand-text .name .hys-g{color:var(--hys-green)}
.brand-text .version{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}

.sidebar-user{
  padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--hys-green),var(--hys-green2));color:#fff;
  box-shadow:0 2px 8px rgba(228,57,46,.3);
}
.user-name{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:10px;color:var(--hys-green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-section{
  padding:16px 16px 4px;font-size:9px;font-weight:800;
  color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;font-weight:500;
  transition:all var(--transition);margin:1px 8px;border-radius:var(--radius-sm);
}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9)}
.nav-item.active{
  color:#fff;background:rgba(228,57,46,.2);font-weight:600;
  box-shadow:inset 3px 0 0 var(--hys-green);
}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  background:var(--red);color:#fff;border-radius:var(--radius-pill);
  font-size:10px;padding:1px 7px;margin-left:auto;font-weight:700;min-width:20px;text-align:center;
}
.nav-badge.amber{background:var(--amber)}

.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-clock{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--hys-green);letter-spacing:1px}
.sidebar-date{font-size:10px;color:rgba(255,255,255,.35);text-transform:capitalize;margin-bottom:10px}
.sidebar-logo-footer{display:flex;align-items:center;gap:8px;margin-bottom:10px;opacity:.3}
.sidebar-logo-footer svg{width:20px;height:20px}
.sidebar-logo-footer span{font-size:10px;color:#fff}

/* ── NOTIF BELL ── */
.notif-bell{position:relative;display:inline-flex}
.notif-count{
  position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;
  border-radius:var(--radius-pill);font-size:9px;font-weight:800;
  padding:1px 5px;min-width:17px;text-align:center;
  border:2px solid var(--hys-dark);animation:pulse 2s infinite;
}

/* ── MAIN CONTENT ── */
.main-content{background:var(--bg);overflow-y:auto;display:flex;flex-direction:column;min-height:100vh}
.page-header{
  padding:28px 32px 0;margin-bottom:24px;
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:12px;
}
.page-header-left h2{
  font-size:24px;font-weight:800;letter-spacing:-.4px;color:var(--text);
  display:flex;align-items:center;gap:10px;
}
.page-header-left p{color:var(--text3);font-size:13px;margin-top:4px;font-weight:500}
.page-body{padding:0 32px 40px;flex:1;animation:fadeIn .3s var(--transition) both}

/* ── CARDS ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:18px;
  box-shadow:var(--shadow);
  transition:box-shadow var(--transition),transform var(--transition);
}
.card:hover{box-shadow:var(--shadow-md)}
.card.hys-card{
  border-color:var(--hys-green-mid);
  background:linear-gradient(135deg,var(--hys-green-light) 0%,var(--card) 60%);
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-subtitle{font-size:11px;color:var(--text3);margin-top:2px}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:20px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;position:relative;overflow:hidden;
  transition:all var(--transition);cursor:default;
  box-shadow:var(--shadow);
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.06;transform:translate(15px,-15px)}
.stat-card.green::before{background:linear-gradient(90deg,var(--hys-green),var(--hys-green2))}
.stat-card.green::after{background:var(--hys-green)}
.stat-card.blue::before{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.stat-card.blue::after{background:#3b82f6}
.stat-card.red::before{background:linear-gradient(90deg,#ef4444,#dc2626)}
.stat-card.red::after{background:#ef4444}
.stat-card.amber::before{background:linear-gradient(90deg,#f59e0b,#d97706)}
.stat-card.amber::after{background:#f59e0b}
.stat-card.purple::before{background:linear-gradient(90deg,#8b5cf6,#7c3aed)}
.stat-card.teal::before{background:linear-gradient(90deg,#0d9488,#0f766e)}
.stat-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.stat-value{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.stat-value.green{color:var(--hys-green)}
.stat-value.blue{color:var(--blue)}
.stat-value.red{color:var(--red)}
.stat-value.amber{color:var(--amber)}
.stat-value.purple{color:var(--purple)}
.stat-value.teal{color:var(--teal)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px;font-weight:500}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  background:var(--bg3);color:var(--text3);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;padding:10px 14px;
  text-align:left;border-bottom:2px solid var(--hys-green-mid);
  white-space:nowrap;position:sticky;top:0;z-index:1;
}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background var(--transition)}
tbody tr:hover td{background:var(--hys-green-light)}
.td-bold{color:var(--text);font-weight:600}
.td-mono{font-family:monospace;font-size:12px}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:var(--radius-pill);font-size:11px;font-weight:600;
  white-space:nowrap;letter-spacing:.2px;
}
.badge-green{background:var(--hys-green-light);color:var(--hys-green3);border:1px solid var(--hys-green-mid)}
.badge-red{background:var(--red-light);color:var(--red2);border:1px solid #fecaca}
.badge-blue{background:var(--blue3);color:var(--blue2);border:1px solid #bfdbfe}
.badge-amber{background:var(--amber-light);color:var(--amber2);border:1px solid #fde68a}
.badge-purple{background:var(--purple-light);color:var(--purple2);border:1px solid #ddd6fe}
.badge-teal{background:var(--teal-light);color:var(--teal2);border:1px solid #99f6e4}
.badge-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
.badge-hys{background:var(--hys-green-light);color:var(--hys-green2);border:1px solid var(--hys-green-mid)}

/* ── FILTERS BAR ── */
.filters-bar{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 16px;box-shadow:var(--shadow);
}
.filters-bar .form-control{width:auto;min-width:130px;padding:7px 11px;font-size:12px}
.filters-bar .btn{font-size:12px;padding:7px 13px}
.search-input{flex:1;min-width:160px}

/* ── MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,23,42,.6);z-index:1000;
  align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.modal-overlay.open{display:flex;animation:fadeIn .2s var(--transition) both}
.modal{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  width:100%;max-width:580px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:scaleIn .25s var(--transition) both;
}
.modal-lg{max-width:780px}
.modal-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:1;
  background:linear-gradient(180deg,var(--hys-green-light) 0%,var(--card) 100%);
}
.modal-header-logo{display:flex;align-items:center;gap:10px}
.modal-header-logo svg{width:26px;height:26px}
.modal-title{font-size:15px;font-weight:800;color:var(--text)}
.modal-close{
  background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-xs);transition:all var(--transition);
}
.modal-close:hover{background:var(--red-light);color:var(--red2)}
.modal-body{padding:20px 24px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
  position:sticky;bottom:0;background:var(--card);z-index:1;
}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:340px}
.toast{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 16px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;
  animation:slideIn .3s var(--transition) both;pointer-events:all;color:var(--text);
}
.toast.success{border-left:4px solid var(--hys-green);background:var(--hys-green-light)}
.toast.error{border-left:4px solid var(--red);background:var(--red-light)}
.toast.info{border-left:4px solid var(--blue);background:var(--blue3)}
.toast.warning{border-left:4px solid var(--amber);background:var(--amber-light)}

/* ── ALERTS ── */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;font-weight:500}
.alert-warning{background:var(--amber-light);border:1px solid #fde68a;color:var(--amber2)}
.alert-danger{background:var(--red-light);border:1px solid #fecaca;color:var(--red2)}
.alert-success{background:var(--hys-green-light);border:1px solid var(--hys-green-mid);color:var(--hys-green3)}
.alert-info{background:var(--blue3);border:1px solid #bfdbfe;color:var(--blue2)}

/* ── POINTAGE BUTTONS ── */
.pointage-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.pointage-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:32px 20px;border-radius:var(--radius);border:2px solid;cursor:pointer;
  font-family:var(--font);font-weight:700;transition:all var(--transition);width:100%;
  position:relative;overflow:hidden;
}

<script>

'use strict';
// ═══════════════════════════════════════════════════════════════════════════
//  HYS FOOD — Horodateur & gestion des congés
//  Rôles : admin_hys · collaborateur
//  Modules : Pointage · Planning hebdomadaire · Congés · Utilisateurs
// ═══════════════════════════════════════════════════════════════════════════

// ─── CONFIG SUPABASE (à modifier si vous utilisez Supabase) ──────────────────
// Voir Paramètres → Supabase dans l'app pour les instructions
const APP_VERSION = '1.0';
const MAX_LOGIN_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000;
const SESSION_TIMEOUT_MS = 8 * 3600 * 1000;
const PAGE_SIZE = 50;

const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS  = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

// ─── RÔLES ──────────────────────────────────────────────────────────────────
const ROLES = {
  ADMIN:   'admin_hys',
  COLLAB:  'collaborateur',
};
const ROLE_LABELS = {
  admin_hys:          '👑 Admin HYS',
  collaborateur:      '👤 Salarié(e)',
};

// ─── TYPES DE DEMI-JOURNÉE ──────────────────────────────────────────────────
const DEMIJOURNEES = {
  matin:    { label:'Créneau 1', icon:'🌞', heureDebut:'10:00', heureFin:'16:00' },
  apresmidi:{ label:'Créneau 2', icon:'🌆', heureDebut:'16:00', heureFin:'22:00' },
};

// ─── ÉTAT GLOBAL ────────────────────────────────────────────────────────────
let currentUser = null;
let currentPage = null;
let lastActivity = Date.now();
let lockoutInterval = null;

// ─── STORE KEYS ──────────────────────────────────────────────────────────────
const SK = {
  USERS:        'hysfood_users',
  POINTAGES:    'hysfood_pointages',
  SESSION:      'hysfood_session',
  SETTINGS:     'hysfood_settings',
  AUDIT:        'hysfood_audit',
  NOTIFICATIONS:'hysfood_notifs',
  LOGIN_ATTEMPTS:'hysfood_login_attempts',
};

// ─── STORE ────────────────────────────────────────────────────────────────────
const store = {
  _cache: {},
  get(key) {
    if (this._cache[key] !== undefined) return this._cache[key];
    try { const v = JSON.parse(localStorage.getItem(key)); this._cache[key] = v; return v; }
    catch { return null; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); this._cache[key] = val; return true; }
    catch(e) { console.error('Store.set:', e); return false; }
  },
  invalidate(key) { delete this._cache[key]; },
  remove(key) { localStorage.removeItem(key); delete this._cache[key]; },

  users()           { return this.get(SK.USERS) || []; },
  saveUsers(u)      { this.set(SK.USERS, u); },
  pointages()       { return this.get(SK.POINTAGES) || []; },
  savePointages(p)  { this.set(SK.POINTAGES, p); },
  notifs()          { return this.get(SK.NOTIFICATIONS) || []; },
  saveNotifs(n)     { this.set(SK.NOTIFICATIONS, n); updateNotifBadge(); },
  audit()           { return this.get(SK.AUDIT) || []; },

  settings() {
    const defs = {
      organisation: 'HYS FOOD',
      territoire: 'mayotte',
      heureDebut: '10:00',
      heureFin: '22:00',
      pauseDejeIner: 60,
      heuresMensuelles: 151.67,
    };
    return Object.assign({}, defs, this.get(SK.SETTINGS) || {});
  },
  saveSettings(s) { this.set(SK.SETTINGS, s); },

  addAudit(entry) {
    const log = this.audit();
    log.unshift({ ...entry, id: uid(), ts: Date.now(), iso: new Date().toISOString() });
    if (log.length > 2000) log.splice(2000);
    this.set(SK.AUDIT, log);
  },
  addNotif(notif) {
    const notifs = this.notifs();
    notifs.unshift({ id: uid(), lu: false, ts: Date.now(), iso: new Date().toISOString(), ...notif });
    if (notifs.length > 300) notifs.splice(300);
    this.saveNotifs(notifs);
  },
  markAllLu() { const n = this.notifs().map(x => ({...x, lu:true})); this.saveNotifs(n); },
  markNotifLu(id) {
    const n = this.notifs(); const item = n.find(x => x.id === id);
    if (item) item.lu = true; this.saveNotifs(n);
  },
};

// ─── UTILS ────────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// Échappement HTML — indispensable avant d'insérer une valeur saisie par un
// utilisateur (nom, note, message…) dans du innerHTML, sinon une entrée comme
// <img src=x onerror=alert(1)> s'exécuterait dans le navigateur de qui la lit.
function esc(v) {
  if (v === null || v === undefined) return '';
  return String(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function now() { return new Date().toISOString(); }
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function timeStr(d) { return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`; }
function showAlert(el, msg, type) { if (!el) return; el.className = `alert alert-${type}`; el.innerHTML = msg; el.style.display = 'flex'; }
function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'À l\'instant';
  if (diff < 3600000) return Math.floor(diff/60000) + ' min';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h';
  return new Date(ts).toLocaleDateString('fr-FR');
}
function formatDuree(minutes) {
  if (!minutes || minutes <= 0) return '0h00';
  const h = Math.floor(minutes / 60), m = minutes % 60;
  return `${h}h${String(m).padStart(2,'0')}`;
}
function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// Postes réels des salarié(e)s HYS FOOD
const POSTES_HYS = [
  'Manageuse restauration',
  'Employé(e) polyvalent(e) en restauration',
  'Cuisinier(ère)',
  'Serveur(se)',
  'Apprenti(e)',
];

// ─── SÉCURITÉ ─────────────────────────────────────────────────────────────────
// Format des hash : "pbkdf2:<iterations>:<selHex>:<hashHex>" (nouveau, sel par
// utilisateur) ou "sha256:<hashHex>" (ancien format, conservé en lecture seule
// pour ne pas invalider les comptes existants — remplacé automatiquement par
// pbkdf2 au prochain changement de mot de passe de l'utilisateur).
const PBKDF2_ITERATIONS = 100000;

function bufToHex(buf) { return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function hexToBuf(hex) { const a = new Uint8Array(hex.length/2); for(let i=0;i<a.length;i++) a[i]=parseInt(hex.substr(i*2,2),16); return a; }

async function hashPassword(pwd) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' }, keyMaterial, 256
  );
  return `pbkdf2:${PBKDF2_ITERATIONS}:${bufToHex(salt)}:${bufToHex(bits)}`;
}

async function hashPasswordLegacySHA256(pwd) {
  const data = new TextEncoder().encode('HYS_PointPro_v1_' + pwd);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return 'sha256:' + bufToHex(buf);
}

async function verifyPassword(pwd, stored) {
  if (!stored) return false;
  if (stored.startsWith('pbkdf2:')) {
    const [, iterStr, saltHex, hashHex] = stored.split(':');
    const salt = hexToBuf(saltHex);
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt, iterations: parseInt(iterStr, 10), hash: 'SHA-256' }, keyMaterial, 256
    );
    return bufToHex(bits) === hashHex;
  }
  if (stored.startsWith('sha256:')) {
    // Ancien format (comptes créés avant la mise à jour sécurité) — vérifié
    // pour compatibilité, mais plus jamais utilisé pour créer de nouveaux hash.
    return (await hashPasswordLegacySHA256(pwd)) === stored;
  }
  return false;
}
function evalPasswordStrength(pwd) {
  let s = 0;
  if (pwd.length >= 8) s++; if (pwd.length >= 12) s++;
  if (/[A-Z]/.test(pwd)) s++; if (/[a-z]/.test(pwd)) s++;
  if (/[0-9]/.test(pwd)) s++; if (/[^A-Za-z0-9]/.test(pwd)) s++;
  if (s <= 2) return { level:'Faible', color:'#ef4444', pct:25 };
  if (s <= 4) return { level:'Moyen', color:'#f59e0b', pct:60 };
  return { level:'Fort', color:'#22c55e', pct:100 };
}
// Génère un mot de passe temporaire aléatoire (remplace les défauts prévisibles
// type "hys2026" / "admin123" codés en dur, visibles dans le code source public).
function generateTempPassword() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
  const bytes = crypto.getRandomValues(new Uint8Array(12));
  return Array.from(bytes, b => chars[b % chars.length]).join('');
}
function getLoginAttempts(u) { return (store.get(SK.LOGIN_ATTEMPTS)||{})[u]||{count:0,lockedUntil:0}; }
function recordLoginAttempt(u, ok) {
  const d = store.get(SK.LOGIN_ATTEMPTS)||{};
  if (ok) { delete d[u]; }
  else { const a = d[u]||{count:0,lockedUntil:0}; a.count++; if (a.count >= MAX_LOGIN_ATTEMPTS) { a.lockedUntil = Date.now()+LOCKOUT_MS; a.count = 0; } d[u] = a; }
  store.set(SK.LOGIN_ATTEMPTS, d);
}
function isAccountLocked(u) { const a = getLoginAttempts(u); return a.lockedUntil > Date.now() ? a.lockedUntil : false; }

function startClock() { tickClock(); setInterval(tickClock, 1000); }
function tickClock() {
  const d = new Date();
  const t = [d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  const dt = `${JOURS[d.getDay()]} ${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}`;
  ['login-clock','sb-clock'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = t; });
  ['login-date','sb-date'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = dt; });
}

// ─── POINTAGES ────────────────────────────────────────────────────────────────
function getPointagesUserDay(userId, date) {
  return store.pointages().filter(p => p.userId === userId && p.date === date)
    .sort((a,b) => a.timestamp - b.timestamp);
}
function calcHeuresJour(pts) {
  let total = 0, entree = null;
  pts.forEach(p => {
    if (p.type === 'entree') entree = p.timestamp;
    else if (p.type === 'sortie' && entree) { total += (p.timestamp - entree) / 60000; entree = null; }
  });
  return Math.round(total);
}

// ─── RETARDS & OUBLIS DE POINTAGE ──────────────────────────────────────────────
// Détecte, pour les collaborateurs actifs et sur un jour ouvré :
//  - les retards : personne pas encore pointée alors que l'heure de début est
//    dépassée (avec une marge de tolérance) ;
//  - les oublis de pointage : personne pointée en entrée mais jamais en sortie,
//    alors que l'heure de fin est largement dépassée.
const RETARD_TOLERANCE_MIN = 15; // marge avant de considérer un retard
const OUBLI_SORTIE_TOLERANCE_MIN = 60; // marge après l'heure de fin avant de signaler un oubli

function getPointageIssuesDuJour() {
  const now = new Date();
  const today = dateStr(now);
  const result = { retards: [], oublis: [] };

  const collabs = store.users().filter(u => u.statut === 'actif' && (u.role === ROLES.COLLAB || u.role === ROLES.ADMIN));
  collabs.forEach(u => {
    if (isAbsentAujourdHui(u.id)) return; // en congé/absence approuvée : pas un retard
    const attendu = getExpectedScheduleForUser(u.id, today);
    if (!attendu) return; // repos, ou journée CFA : aucun pointage HYS FOOD attendu
    const pts = getPointagesUserDay(u.id, today);
    const statut = getCreneauPointageStatus(attendu, pts);
    const entree = pts.find(p => p.type === 'entree');
    if (statut.enRetard) {
      result.retards.push(u);
    } else if (statut.sortieOubliee) {
      result.oublis.push({ ...u, _heureEntree: entree ? entree.heure.slice(0,5) : '' });
    }
  });
  return result;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = (document.getElementById('login-username')?.value||'').trim();
  const password = document.getElementById('login-password')?.value||'';
  if (!username || !password) { showLoginAlert('Veuillez remplir tous les champs.','warning'); return; }
  const lockedUntil = isAccountLocked(username);
  if (lockedUntil) { startLockoutDisplay(lockedUntil); return; }
  const users = store.users();
  const user = users.find(u => u.username === username && u.statut === 'actif');
  if (!user) { recordLoginAttempt(username,false); updateAttemptBar(username); showLoginAlert('Identifiant ou mot de passe incorrect.','error'); return; }
  const valid = await verifyPassword(password, user.password);
  if (!valid) {
    recordLoginAttempt(username,false); updateAttemptBar(username);
    const att = getLoginAttempts(username); const rem = MAX_LOGIN_ATTEMPTS - att.count;
    showLoginAlert(`Mot de passe incorrect. ${rem} tentative${rem>1?'s':''} restante${rem>1?'s':''}.`,'error'); return;
  }
  recordLoginAttempt(username, true);
  store.set(SK.SESSION, { userId: user.id, loginAt: Date.now() });
  currentUser = store.users().find(u => u.id === user.id);
  store.addAudit({ action:'LOGIN', userId:user.id, detail:`Connexion : ${user.prenom} ${user.nom} (${ROLE_LABELS[user.role]})` });
  if (document.getElementById('login-password')) document.getElementById('login-password').value = '';
  if (document.getElementById('login-alert')) document.getElementById('login-alert').style.display = 'none';
  if (currentUser.firstLogin) { showView('change-pwd'); return; }
  showApp();
}
function showLoginAlert(msg, type) {
  const el = document.getElementById('login-alert'); if (!el) return;
  el.className = `alert alert-${type==='error'?'danger':type}`; el.innerHTML = `⚠️ ${msg}`; el.style.display = 'flex';
}
function updateAttemptBar(username) {
  const att = getLoginAttempts(username);
  const bar = document.getElementById('login-attempt-bar'), fill = document.getElementById('login-attempt-fill');
  if (bar) bar.style.display = 'block'; if (fill) fill.style.width = (att.count/MAX_LOGIN_ATTEMPTS*100)+'%';
}
function startLockoutDisplay(lockedUntil) {
  const locked = document.getElementById('login-locked'), timerEl = document.getElementById('lockdown-timer');
  if (!locked||!timerEl) return; locked.style.display = 'flex';
  if (lockoutInterval) clearInterval(lockoutInterval);
  lockoutInterval = setInterval(() => {
    const rem = Math.ceil((lockedUntil-Date.now())/1000);
    if (rem <= 0) { locked.style.display = 'none'; clearInterval(lockoutInterval); return; }
    timerEl.textContent = rem;
  }, 1000);
  timerEl.textContent = Math.ceil((lockedUntil-Date.now())/1000);
  showLoginAlert(`Compte verrouillé ${LOCKOUT_MS/60000} min.`,'error');
}
async function doChangePassword() {
  const np = document.getElementById('new-pwd')?.value||'', nc = document.getElementById('new-pwd-confirm')?.value||'';
  const el = document.getElementById('changepwd-alert');
  if (np.length < 8) { showAlert(el,'⚠️ Minimum 8 caractères.','danger'); return; }
  if (evalPasswordStrength(np).level === 'Faible') { showAlert(el,'⚠️ Mot de passe trop faible.','danger'); return; }
  if (np !== nc) { showAlert(el,'⚠️ Les mots de passe ne correspondent pas.','danger'); return; }
  const hash = await hashPassword(np);
  const users = store.users(), i = users.findIndex(u => u.id === currentUser.id);
  users[i].password = hash; users[i].firstLogin = false; store.saveUsers(users); currentUser = users[i];
  store.addAudit({ action:'PWD_CHANGE', userId:currentUser.id, detail:'Changement de mot de passe initial' });
  toast('Mot de passe défini.','success'); showApp();
}
function doLogout() {
  if (currentUser) store.addAudit({ action:'LOGOUT', userId:currentUser.id, detail:`Déconnexion : ${esc(currentUser.prenom)} ${esc(currentUser.nom)}` });
  store.remove(SK.SESSION); currentUser = null; currentPage = null;
  ['login-username','login-password'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  ['login-alert','login-locked','login-attempt-bar'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display='none'; });
  showView('login');
}
function restoreSession() {
  const s = store.get(SK.SESSION);
  if (s) {
    const user = store.users().find(u => u.id === s.userId && u.statut === 'actif');
    if (user && Date.now()-(s.loginAt||0) < SESSION_TIMEOUT_MS) {
      currentUser = user; if (user.firstLogin) { showView('change-pwd'); return; } showApp(); return;
    }
    store.remove(SK.SESSION);
  }
  showView('login');
}

          <span class="icon">🚪</span><span>Pointer Sortie</span>
          <span class="sub">${store.settings().heureFin||'16:00'} · Alt+S</span>
        </button>

          `<ul class="timeline">${[...pts].reverse().map(p=>`
            <li class="timeline-item">
              <div class="timeline-dot ${p.type==='entree'?'in':'out'}">${p.type==='entree'?'→':'←'}</div>
              <div class="timeline-content">
                <div class="timeline-time">${p.heure.slice(0,5)}</div>

              </div>
            </li>`).join('')}</ul>`}
      </div>
    </div>`;
  document.getElementById('btn-entree')?.addEventListener('click', () => doPointage('entree'));
  document.getElementById('btn-sortie')?.addEventListener('click', () => doPointage('sortie'));
}

async function doPointage(type) {
  const d = new Date();
  const p = { id:uid(), userId:currentUser.id, type, date:dateStr(d), heure:timeStr(d), timestamp:d.getTime() };
  const pts = store.pointages(); pts.push(p); store.savePointages(pts);
  store.addAudit({ action:type==='entree'?'POINTAGE_ENTREE':'POINTAGE_SORTIE', userId:currentUser.id, detail:`${type==='entree'?'Entrée':'Sortie'} à ${p.heure} le ${p.date}` });
  store.addNotif({ type:'pointage', userId:currentUser.id, message:`${esc(currentUser.prenom)} ${esc(currentUser.nom)} — ${type==='entree'?'Entrée':'Sortie'} à ${p.heure}` });
  toast(`${type==='entree'?'✅ Entrée':'🚪 Sortie'} enregistrée à ${p.heure.slice(0,5)}`,'success');
  renderPagePointage();
}

// ─── PAGE: MON HISTORIQUE ─────────────────────────────────────────────────────
function renderPageMonHistorique() {
  const pts = store.pointages().filter(p => p.userId === currentUser.id).sort((a,b) => b.date.localeCompare(a.date)||b.timestamp-a.timestamp);
  // Grouper par semaine
  const semaines = {};
  pts.forEach(p => {
    const d = new Date(p.date+'T00:00:00');
    const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const key = dateStr(mon);
    if (!semaines[key]) semaines[key] = { debut:dateStr(mon), jours:{} };
    if (!semaines[key].jours[p.date]) semaines[key].jours[p.date] = [];
    semaines[key].jours[p.date].push(p);
  });

  // Résumé du mois en cours : heures effectuées vs objectif mensuel de référence
  const now = new Date();
  const moisKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const joursMoisCourant = {};
  pts.filter(p => p.date.startsWith(moisKey)).forEach(p => {
    if (!joursMoisCourant[p.date]) joursMoisCourant[p.date] = [];
    joursMoisCourant[p.date].push(p);
  });
  const totalMoisMin = Object.values(joursMoisCourant).reduce((acc, ptsJ) => acc + calcHeuresJour([...ptsJ].sort((a,b)=>a.timestamp-b.timestamp)), 0);
  const objectifH = store.settings().heuresMensuelles || 151.67;
  const objectifMin = Math.round(objectifH * 60);
  const pct = Math.min(100, Math.round((totalMoisMin / objectifMin) * 100));
  const resteMin = Math.max(0, objectifMin - totalMoisMin);
  const moisLabel = MOIS ? MOIS[now.getMonth()] : now.toLocaleDateString('fr-FR', { month:'long' });

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="page-header">
      <div class="page-header-left"><h2>📋 Mon historique</h2><p>${esc(currentUser.prenom)} ${esc(currentUser.nom)}</p></div>
    </div>
    <div class="page-body">
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><div class="card-title">📅 ${moisLabel} ${now.getFullYear()}</div></div>
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          <span style="font-size:28px;font-weight:800;color:var(--hys-green)">${formatDuree(totalMoisMin)}</span>
          <span class="text-muted">sur ${objectifH}h de référence</span>
        </div>
        <div style="background:var(--bg3);border-radius:var(--radius-pill);height:10px;overflow:hidden">
          <div style="background:linear-gradient(90deg,var(--hys-green),var(--hys-yellow));height:100%;width:${pct}%;transition:width .3s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span class="text-xs text-muted">${pct}% de l'objectif</span>
          <span class="text-xs text-muted">${resteMin > 0 ? 'Reste ' + formatDuree(resteMin) : 'Objectif atteint ✅'}</span>
        </div>
      </div>
      ${Object.keys(semaines).length === 0 ? `<div class="card"><div class="empty-state"><div class="icon">📋</div><p>Aucun pointage enregistré</p></div></div>` :
      Object.entries(semaines).sort((a,b) => b[0].localeCompare(a[0])).map(([key, sem]) => {
        const joursData = Object.entries(sem.jours).sort((a,b) => a[0].localeCompare(b[0]));
        const totalMin = joursData.reduce((acc,[,ptsJ]) => acc + calcHeuresJour([...ptsJ].sort((a,b)=>a.timestamp-b.timestamp)), 0);
        return `<div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Semaine du ${sem.debut}</div>
            </div>
            <span class="badge badge-blue">${formatDuree(totalMin)}</span>
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>Jour</th><th>Entrée</th><th>Sortie</th><th>Durée</th></tr></thead>
            <tbody>${joursData.map(([date, ptsJ]) => {
              const sorted = [...ptsJ].sort((a,b) => a.timestamp-b.timestamp);
              const entree = sorted.find(p => p.type==='entree');
              const sortie = [...sorted].reverse().find(p => p.type==='sortie');
              const dur = calcHeuresJour(sorted);
              return `<tr>
                <td class="td-bold">${JOURS[new Date(date+'T00:00:00').getDay()]} ${date.slice(8)}</td>
                <td>${entree ? entree.heure.slice(0,5) : '—'}</td>
                <td>${sortie ? sortie.heure.slice(0,5) : '—'}</td>
                <td>${dur > 0 ? formatDuree(dur) : '—'}</td>
              </tr>`;
            }).join('')}
            </tbody>
          </table></div>
        </div>`;
      }).join('')}
    </div>`;
}

function showModalCorrection(userId, date) {
  const u = store.users().find(x => x.id === userId); if (!u) return;
  const pts = getPointagesUserDay(userId, date);
  const sorted = [...pts].sort((a,b)=>a.timestamp-b.timestamp);
  const entrees = sorted.filter(p => p.type === 'entree');
  const sorties  = sorted.filter(p => p.type === 'sortie');
  // 1er couple entrée/sortie = matin, 2e couple = après-midi (si présent)
  const matinE = entrees[0]?.heure.slice(0,5) || '';
  const matinS = sorties[0]?.heure.slice(0,5) || '';
  const amE = entrees[1]?.heure.slice(0,5) || '';
  const amS = sorties[1]?.heure.slice(0,5) || '';

  openModal(`✏️ Corriger — ${esc(u.prenom)} ${esc(u.nom)} · ${date}`, `
    <div class="alert alert-warning">⚠️ Toute correction est tracée dans le journal d'audit.</div>
    <p class="text-xs text-muted" style="margin-bottom:10px">Laissez un champ vide si la personne n'a pas travaillé sur cette plage (ex : absente sur le créneau 2).</p>
    <div class="card" style="padding:12px;margin-bottom:10px;background:var(--bg2)">
      <div class="card-title" style="margin-bottom:8px">${DEMIJOURNEES.matin.icon} ${DEMIJOURNEES.matin.label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Entrée</label>
          <input id="corr-matin-entree" type="time" class="form-control" value="${matinE}" placeholder="${DEMIJOURNEES.matin.heureDebut}">
        </div>
        <div class="form-group"><label>Sortie</label>
          <input id="corr-matin-sortie" type="time" class="form-control" value="${matinS}" placeholder="${DEMIJOURNEES.matin.heureFin}">
        </div>
      </div>
      <button class="btn btn-ghost btn-xs" id="corr-matin-defaut" type="button">↺ Remplir ${DEMIJOURNEES.matin.heureDebut}–${DEMIJOURNEES.matin.heureFin}</button>
    </div>
    <div class="card" style="padding:12px;margin-bottom:10px;background:var(--bg2)">
      <div class="card-title" style="margin-bottom:8px">${DEMIJOURNEES.apresmidi.icon} ${DEMIJOURNEES.apresmidi.label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Entrée</label>
          <input id="corr-am-entree" type="time" class="form-control" value="${amE}" placeholder="${DEMIJOURNEES.apresmidi.heureDebut}">
        </div>
        <div class="form-group"><label>Sortie</label>
          <input id="corr-am-sortie" type="time" class="form-control" value="${amS}" placeholder="${DEMIJOURNEES.apresmidi.heureFin}">
        </div>
      </div>
      <button class="btn btn-ghost btn-xs" id="corr-am-defaut" type="button">↺ Remplir ${DEMIJOURNEES.apresmidi.heureDebut}–${DEMIJOURNEES.apresmidi.heureFin}</button>
    </div>
    <div class="form-group"><label>Motif de correction</label>
      <input id="corr-motif" class="form-control" placeholder="Raison de la correction…">
    </div>`,
    [
      { label:'Annuler', cls:'btn-ghost', action:closeModal },
      { label:'💾 Appliquer', cls:'btn-amber', action:() => {
        const me = document.getElementById('corr-matin-entree')?.value;
        const ms = document.getElementById('corr-matin-sortie')?.value;
        const ae = document.getElementById('corr-am-entree')?.value;
        const as = document.getElementById('corr-am-sortie')?.value;
        const motif = document.getElementById('corr-motif')?.value?.trim()||'Correction admin';
        // Supprimer pts existants du jour, reconstruire avec les 2 plages
        let allPts = store.pointages().filter(p => !(p.userId === userId && p.date === date));
        const addPt = (type, heure) => {
          const ts = new Date(date+'T'+heure+':00').getTime();
          allPts.push({ id:uid(), userId, type, date, heure:heure+':00', timestamp:ts, correctedBy:currentUser.id });
        };
        if (me) addPt('entree', me);
        if (ms) addPt('sortie', ms);
        if (ae) addPt('entree', ae);
        if (as) addPt('sortie', as);
        store.savePointages(allPts);
        store.addAudit({ action:'CORRECTION_POINTAGE', userId:currentUser.id, detail:`Correction pointage ${esc(u.prenom)} ${esc(u.nom)} (${date}) — ${motif}` });
        closeModal(); toast('Pointage corrigé.','success');
        if (currentPage === 'presence-rt') renderPagePresenceRT();
        else renderPagePointageAdmin(date, '');
      }}
    ]);
  document.getElementById('corr-matin-defaut')?.addEventListener('click', () => {
    document.getElementById('corr-matin-entree').value = DEMIJOURNEES.matin.heureDebut;
    document.getElementById('corr-matin-sortie').value = DEMIJOURNEES.matin.heureFin;
  });
  document.getElementById('corr-am-defaut')?.addEventListener('click', () => {
    document.getElementById('corr-am-entree').value = DEMIJOURNEES.apresmidi.heureDebut;
    document.getElementById('corr-am-sortie').value = DEMIJOURNEES.apresmidi.heureFin;
  });
}

function exportPointagesCSV(date) {
  const users = store.users().filter(u => u.statut === 'actif' && u.role !== ROLES.ADMIN);
  const rows = [['Date','Utilisateur','Rôle','Entrée','Sortie','Durée (min)']];
  users.forEach(u => {
    const pts = getPointagesUserDay(u.id, date);
    const sorted = [...pts].sort((a,b)=>a.timestamp-b.timestamp);
    const entree = sorted.find(p=>p.type==='entree');
    const sortie = [...sorted].reverse().find(p=>p.type==='sortie');
    rows.push([date, `${esc(u.prenom)} ${esc(u.nom)}`, ROLE_LABELS[u.role]||u.role, entree?.heure.slice(0,5)||'', sortie?.heure.slice(0,5)||'', calcHeuresJour(sorted)]);
  });
  downloadCSV(rows, `pointages_${date}.csv`);
  toast('Export CSV pointages.','success');
}

function exportBackup() {
  const backup = {
    version: APP_VERSION, exportedAt: now(),
    users: store.users(), pointages: store.pointages(),
    absences: store.absences(), soldesCP: store.soldesCP(),
    settings: store.settings(),

  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `hysfood_backup_${dateStr(new Date())}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  store.addAudit({ action:'BACKUP_EXPORT', userId:currentUser.id, detail:'Sauvegarde complète exportée' });
  toast('Sauvegarde exportée.','success');
}

function importBackup(event) {
  const file = event.target?.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.users) { toast('Fichier invalide.','error'); return; }
      if (confirm(`⚠️ Restaurer depuis "${file.name}" ?\nToutes les données actuelles seront remplacées.`)) {
        store.saveUsers(data.users||[]);
        store.savePointages(data.pointages||[]);
        store.saveAbsences(data.absences||[]);
        store.saveSoldesCP(data.soldesCP||[]);
        if (data.settings) store.saveSettings(data.settings);
        if (data.audit) store.set(SK.AUDIT, data.audit);
        if (data.notifications) store.set(SK.NOTIFICATIONS, data.notifications);
        toast('Données restaurées. Rechargement…','success');
        setTimeout(() => location.reload(), 1500);
      }
    } catch { toast('Erreur lecture fichier.','error'); }
  };
  reader.readAsText(file);
  if (event.target) event.target.value = '';
}

// ─── PLANNING HEBDOMADAIRE ────────────────────────────────────────────────────
// Jours de la semaine (clé interne -> libellé). Sert de référence unique.
const JOURS_SEMAINE = [
  { key:'lundi',    label:'Lundi' },
  { key:'mardi',    label:'Mardi' },
  { key:'mercredi', label:'Mercredi' },
  { key:'jeudi',    label:'Jeudi' },
  { key:'vendredi', label:'Vendredi' },
  { key:'samedi',   label:'Samedi' },
  { key:'dimanche', label:'Dimanche' },
];
const LIEUX_PLANNING = {
  hys_food: { label:'HYS FOOD',              icon:'🍟', badge:'badge-red'    },
  cfa:      { label:'CFA (HYS Consulting)',  icon:'🎓', badge:'badge-blue'   },
  repos:    { label:'Repos',                 icon:'💤', badge:'badge-gray'   },
};
function jourKeyFromDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const idx = d.getDay(); // 0=dimanche..6=samedi
  return ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'][idx];
}
// Renvoie le programme attendu d'un salarié pour une date donnée :
// { lieu, heureDebut, heureFin, creneaux } si travail attendu chez HYS FOOD ce
// jour-là (heureDebut = début du premier créneau, heureFin = fin du dernier —
// utilisés pour la détection de retard/oubli), ou null si aucun pointage HYS
// FOOD n'est attendu (repos, ou journée en CFA).
// Si aucun planning n'a été configuré pour ce salarié, retourne les horaires
// par défaut de l'organisation (comportement historique, jours ouvrés uniquement).
function getExpectedScheduleForUser(userId, dateStr) {
  const planning = store.getPlanningUser(userId);
  if (!planning) {
    if (!isJourOuvrable(dateStr)) return null;
    const s = store.settings();
    const heureDebut = s.heureDebut||'10:00', heureFin = s.heureFin||'22:00';
    return { lieu:'hys_food', heureDebut, heureFin, creneaux:[{debut:heureDebut,fin:heureFin}] };
  }
  const jour = planning.jours?.[jourKeyFromDate(dateStr)];
  if (!jour || jour.lieu !== 'hys_food') return null;
  const creneaux = (jour.creneaux && jour.creneaux.length) ? jour.creneaux : [{debut:jour.heureDebut||'10:00', fin:jour.heureFin||'22:00'}];
  return { lieu:'hys_food', heureDebut: creneaux[0].debut, heureFin: creneaux[creneaux.length-1].fin, creneaux };
}
// Formate les créneaux d'un jour en texte lisible : "10h-17h" ou "11h-15h / 18h-22h"
function formatCreneaux(creneaux) {
  if (!creneaux || !creneaux.length) return '—';
  return creneaux.map(c => `${(c.debut||'').replace(':','h')}-${(c.fin||'').replace(':','h')}`).join(' / ');
}
// Analyse le statut de pointage d'un salarié pour un jour donné, créneau par
// créneau (gère les services coupés, ex: 11h-15h puis 18h-22h) : le n-ième
// pointage d'entrée/sortie correspond au n-ième créneau attendu.
function getCreneauPointageStatus(attendu, pts) {
  const now = new Date();
  const creneaux = attendu.creneaux || [];
  const entrees = pts.filter(p => p.type === 'entree');
  const sorties = pts.filter(p => p.type === 'sortie');
  let retardIdx = null, oubliIdx = null;
  creneaux.forEach((c, i) => {
    if (retardIdx === null && entrees.length <= i) {
      const [hD, mD] = (c.debut||'10:00').split(':').map(Number);
      const seuil = new Date(now); seuil.setHours(hD, mD + RETARD_TOLERANCE_MIN, 0, 0);
      if (now > seuil) retardIdx = i;
    }
    if (oubliIdx === null && entrees.length > i && sorties.length <= i) {
      const [hF, mF] = (c.fin||'22:00').split(':').map(Number);
      const seuil = new Date(now); seuil.setHours(hF, mF + OUBLI_SORTIE_TOLERANCE_MIN, 0, 0);
      if (now > seuil) oubliIdx = i;
    }
  });
  return { enRetard: retardIdx !== null, retardIdx, sortieOubliee: oubliIdx !== null, oubliIdx, nbCreneaux: creneaux.length };
}

// ─── CALCUL JOURS OUVRABLES MAYOTTE ──────────────────────────────────────────
function isJourOuvrable(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false; // weekend
  if (FERIES_MAYOTTE.has(dateStr)) return false;
  return true;
}

function joursOuvrablesBetween(debut, fin) {
  let count = 0;
  const start = new Date(debut + 'T00:00:00');
  const end   = new Date(fin   + 'T00:00:00');
  const cur   = new Date(start);
  while (cur <= end) {
    const ds = dateStr(cur);
    if (isJourOuvrable(ds)) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

// Calcul CP acquis depuis date d'entrée jusqu'à aujourd'hui (2,5j/mois, période juin–mai)
// Début de la période de référence CP en cours (1er juin → 31 mai, comme dans
// le fichier de suivi RH). Tout le monde acquiert des droits sur cette période
// commune, à partir du 1er juin OU de sa date d'entrée si postérieure.
function getPeriodeCPDebut(ref) {
  const d = ref || new Date();
  const year = d.getMonth() >= 5 ? d.getFullYear() : d.getFullYear() - 1; // mois 5 = juin (0-indexé)
  return new Date(year, 5, 1);
}
function calcCPAcquis(dateEntree) {
  const entree = new Date(dateEntree + 'T00:00:00');
  const periodeDebut = getPeriodeCPDebut(new Date());
  const start = entree > periodeDebut ? entree : periodeDebut;
  const today  = new Date();
  if (today <= start) return 0;
  // Compter les mois complets
  let months = (today.getFullYear() - start.getFullYear()) * 12
             + (today.getMonth()    - start.getMonth());
  if (today.getDate() < start.getDate()) months--;
  if (months < 0) months = 0;
  return Math.round(months * TAUX_MENSUEL_CP * 10) / 10;
}

// CP pris pour un user (absences de type 'cp' approuvées)
function calcCPPris(userId) {
  return store.absences()
    .filter(a => a.userId === userId && a.type === 'cp' && a.statut === 'approuve')
    .reduce((acc, a) => acc + (a.joursOuvrables || 0), 0);
}

// Solde CP complet d'un utilisateur
function getSoldeComplet(userId) {
  const user = store.users().find(u => u.id === userId);
  if (!user) return { reliquatN1: 0, acquis: 0, pris: 0, soldeN1: 0, soldeN: 0, total: 0 };
  const solde = store.getSoldeUser(userId) || {};
  const reliquatN1 = solde.reliquatN1 !== undefined ? solde.reliquatN1 : 0;
  const acquis = calcCPAcquis(user.dateEntree || '2026-06-01');
  const pris = calcCPPris(userId);
  // Imputation N-1 en premier
  const imputeN1 = Math.min(pris, reliquatN1);
  const imputeN  = Math.max(0, pris - reliquatN1);
  return {
    reliquatN1,
    acquis,
    pris,
    soldeN1: reliquatN1 - imputeN1,
    soldeN:  acquis - imputeN,
    total:   (reliquatN1 - imputeN1) + (acquis - imputeN),
  };
}

// Vérifier si un collab est absent aujourd'hui
function isAbsentAujourdHui(userId) {
  const today = dateStr(new Date());
  return store.absences().some(a =>
    a.userId === userId && a.statut === 'approuve' && a.dateDebut <= today && a.dateFin >= today
  );
}

function getAbsenceAujourdHui(userId) {
  const today = dateStr(new Date());
  return store.absences().find(a =>
    a.userId === userId && a.statut === 'approuve' && a.dateDebut <= today && a.dateFin >= today
  ) || null;
}

function showModalNewAbsence() {
  const today = dateStr(new Date());
  const solde = getSoldeComplet(currentUser.id);
  openModal('🌴 Nouvelle demande d\'absence', `
    <div class="form-group"><label>Type *</label>
      <select id="abs-type" class="form-control">
        ${Object.entries(ABSENCE_TYPES).map(([k,v]) => `<option value="${k}">${v.icon} ${v.label}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label>Date début *</label>
        <input id="abs-deb" type="date" class="form-control" value="${today}" min="${today}">
      </div>
      <div class="form-group"><label>Date fin *</label>
        <input id="abs-fin" type="date" class="form-control" value="${today}" min="${today}">
      </div>
    </div>
    <div id="abs-info" class="alert alert-info" style="display:none"></div>
    <div class="form-group"><label>Commentaire</label>
      <input id="abs-comment" class="form-control" placeholder="Motif, précision…">
    </div>
    <div id="abs-err" style="display:none"></div>`,
    [
      { label:'Annuler', cls:'btn-ghost', action: closeModal },
      { label:'📤 Envoyer', cls:'btn-primary', action: () => {
        const type    = document.getElementById('abs-type')?.value;
        const debut   = document.getElementById('abs-deb')?.value;
        const fin     = document.getElementById('abs-fin')?.value;
        const comment = document.getElementById('abs-comment')?.value?.trim()||'';
        const err     = document.getElementById('abs-err');
        if (!debut || !fin) { showAlert(err,'⚠️ Dates obligatoires.','danger'); return; }
        if (debut > fin) { showAlert(err,'⚠️ Date début > date fin.','danger'); return; }
        const jours = joursOuvrablesBetween(debut, fin);
        if (type === 'cp' && jours > solde.total) {
          showAlert(err,`⚠️ Solde insuffisant (${solde.total} j disponibles, ${jours} j demandés).`,'danger'); return;
        }
        const absences = store.absences();
        absences.push({ id:uid(), userId:currentUser.id, type, dateDebut:debut, dateFin:fin,
          joursOuvrables:jours, commentaire:comment, statut:'en_attente', createdAt:now() });
        store.saveAbsences(absences);
        store.addAudit({ action:'ABSENCE_DEMANDE', userId:currentUser.id,
          detail:`${ABSENCE_TYPES[type]?.label} du ${debut} au ${fin} (${jours} j)` });
        store.addNotif({ type:'conge_demande', userId:currentUser.id,
          message:`${esc(currentUser.prenom)} ${esc(currentUser.nom)} demande ${ABSENCE_TYPES[type]?.label} du ${debut} au ${fin} (${jours} j)` });
        closeModal(); toast('Demande envoyée.','success'); renderSidebar(); renderPageMesConges();
      }}
    ]);

  // Live update du nombre de jours
  const updateInfo = () => {
    const deb = document.getElementById('abs-deb')?.value;
    const fin = document.getElementById('abs-fin')?.value;
    const info = document.getElementById('abs-info');
    if (deb && fin && deb <= fin && info) {
      const j = joursOuvrablesBetween(deb, fin);
      info.style.display = 'flex';
      info.textContent = `📅 ${j} jour(s) ouvrable(s) · Solde CP disponible : ${solde.total} j`;
    }
  };
  setTimeout(() => {
    document.getElementById('abs-deb')?.addEventListener('change', updateInfo);
    document.getElementById('abs-fin')?.addEventListener('change', updateInfo);
    updateInfo();
  }, 80);
}

function updateAbsenceStatut(absId, newStatut) {
  const absences = store.absences();
  const i = absences.findIndex(a => a.id === absId); if (i < 0) return;
  absences[i].statut = newStatut;
  absences[i].updatedAt = now();
  absences[i].updatedBy = currentUser.id;
  store.saveAbsences(absences);
  const a = absences[i];
  const u = store.users().find(x => x.id === a.userId);
  store.addAudit({ action:`ABSENCE_${newStatut.toUpperCase()}`, userId:currentUser.id,
    detail:`${ABSENCE_TYPES[a.type]?.label} ${u?u.prenom+' '+u.nom:''} du ${a.dateDebut} au ${a.dateFin} → ${newStatut}` });
  store.addNotif({ type: newStatut==='approuve'?'conge_approuve':'conge_refuse', userId: a.userId,
    message:`Votre demande de ${ABSENCE_TYPES[a.type]?.label} du ${a.dateDebut} au ${a.dateFin} a été ${newStatut==='approuve'?'approuvée ✅':'refusée ❌'}` });
  toast(`Demande ${newStatut==='approuve'?'approuvée':'refusée'}.`, newStatut==='approuve'?'success':'info');
  renderSidebar();
  renderPageCongesAdmin();
}

function exportAbsencesCSV() {
  const rows = [['Collaborateur','Type','Du','Au','Jours ouvrables','Statut','Créée le']];
  store.absences().forEach(a => {
    const u = store.users().find(x => x.id === a.userId);
    const info = ABSENCE_TYPES[a.type] || {};
    rows.push([u?u.prenom+' '+u.nom:'', info.label||a.type, a.dateDebut, a.dateFin, a.joursOuvrables, a.statut, new Date(a.createdAt).toLocaleDateString('fr-FR')]);
  });
  downloadCSV(rows, `absences_${dateStr(new Date())}.csv`);
  toast('Export absences.','success');
}

function exportRapportCSV(ym, collabs, days) {
  const [year, month] = ym.split('-').map(Number);
  const rows = [['Collaborateur','Fonction','Jours pointés','Total heures (min)','Absences (j)','Solde CP restant']];
  const joursOuvrablesMois = days.filter(d => isJourOuvrable(d)).length;
  collabs.forEach(u => {
    const joursPointes = days.filter(d => calcHeuresJour(getPointagesUserDay(u.id,d).sort((a,b)=>a.timestamp-b.timestamp)) > 0).length;
    const totalMin = days.reduce((a,d) => a + calcHeuresJour(getPointagesUserDay(u.id,d).sort((x,y)=>x.timestamp-y.timestamp)), 0);
    const absencesMois = store.absences().filter(a => a.userId===u.id && a.statut==='approuve' && a.dateDebut.startsWith(ym));
    const joursAbsents = absencesMois.reduce((a,b)=>a+(b.joursOuvrables||0),0);
    const solde = getSoldeComplet(u.id);
    rows.push([`${esc(u.prenom)} ${esc(u.nom)}`, u.service||'', `${joursPointes}/${joursOuvrablesMois}`, totalMin, joursAbsents, solde.total]);
  });
  downloadCSV(rows, `rapport_mensuel_${ym}.csv`);
  toast('Rapport mensuel exporté.','success');
}

// ─── PDF ENGINE (jsPDF via CDN) ──────────────────────────────────────────────
let _jsPDFLoaded = false;
function loadJsPDF() {
  return new Promise((resolve, reject) => {
    if (window.jspdf) { resolve(window.jspdf.jsPDF); return; }
    if (_jsPDFLoaded) { const wait = setInterval(() => { if (window.jspdf) { clearInterval(wait); resolve(window.jspdf.jsPDF); } }, 100); return; }
    _jsPDFLoaded = true;
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload = () => resolve(window.jspdf.jsPDF);
    s.onerror = () => reject(new Error('jsPDF non chargé'));
    document.head.appendChild(s);
  });
}

function renderKioskPIN(action = 'entree') {

function validateKioskPIN(pin, action) {
  const users = store.users().filter(u => u.statut === 'actif' && u.pin === pin);
  const errEl = document.getElementById('kiosk-err');

  if (users.length === 0) {
    if (errEl) errEl.textContent = '❌ Code PIN incorrect. Réessayez.';
    window._kioskPin = '';
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById(`dot-${i}`);
      if (dot) dot.style.background = 'var(--red)';
    }
    setTimeout(() => {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`dot-${i}`);
        if (dot) dot.style.background = 'var(--border2)';
      }
      if (errEl) errEl.textContent = '';
    }, 1200);
    return;
  }

  const user = users[0];
  const d = new Date();
  const p = { id: uid(), userId: user.id, type: action, date: dateStr(d), heure: timeStr(d), timestamp: d.getTime(), source: 'kiosque' };
  const pts = store.pointages(); pts.push(p); store.savePointages(pts);
  store.addAudit({ action: action === 'entree' ? 'KIOSK_ENTREE' : 'KIOSK_SORTIE', userId: user.id, detail: `Kiosque · ${action} à ${p.heure}` });

  // Success screen
  const kv = document.getElementById('view-kiosk'); if (!kv) return;
  clearInterval(window._kioskClock);
  const actionLabel = action === 'entree' ? 'Entrée enregistrée' : 'Sortie enregistrée';
  const actionIcon  = action === 'entree' ? '✅' : '🚪';
  kv.innerHTML = `
    <div style="text-align:center;padding:40px 24px">
      <div style="font-size:72px;margin-bottom:16px">${actionIcon}</div>
      <div style="font-size:26px;font-weight:800;color:var(--hys-green)">${actionLabel}</div>
      <div style="font-size:20px;font-weight:600;color:var(--text);margin-top:8px">${user.prenom} ${user.nom}</div>
      <div style="font-size:28px;font-weight:800;color:var(--hys-green);font-variant-numeric:tabular-nums;margin-top:12px;letter-spacing:2px">${p.heure.slice(0,5)}</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px">${p.date}</div>
      <div style="margin-top:28px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;max-width:200px;margin-left:auto;margin-right:auto">
        <div id="kiosk-progress" style="height:100%;width:0%;background:var(--hys-green);transition:width 3s linear;border-radius:2px"></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Retour automatique dans 3 secondes…</div>
    </div>`;
  requestAnimationFrame(() => {
    const prog = document.getElementById('kiosk-progress');
    if (prog) prog.style.width = '100%';
  });
  setTimeout(() => renderKioskHome(), 3000);
}

function promptKioskExit() {
  const pwd = prompt('Mot de passe admin pour quitter le mode kiosque :');

  // Verify against admin users
  const admins = store.users().filter(u => u.role === ROLES.ADMIN && u.statut === 'actif');

      store.setKiosk(false);
      toast('Mode kiosque désactivé.', 'info');

      alert('Mot de passe incorrect.');

// ─── SERVICE WORKER — MODE HORS-LIGNE ─────────────────────────────────────────
// Le SW doit être un fichier réel servi en HTTP(S) — les navigateurs refusent les
// blob: URL pour les Service Workers (contrairement aux Web Workers classiques).
// Voir sw.js à la racine du dépôt, à côté de index.html.
function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) {
    console.log('[HYS] Service Worker non supporté');
    return;
  }
  // location.protocol file:// ne supporte pas les Service Workers
  if (location.protocol === 'file:') {
    console.log('[HYS] Service Worker désactivé (file://)');
    return;
  }
  // Portée = dossier courant (ex: /pointpro/), jamais '/' pour ne pas déborder
  // sur d'autres apps hébergées sur le même domaine GitHub Pages.
  const scopePath = location.pathname.replace(/[^/]*$/, '');
  const swUrl = scopePath + 'sw.js';
  navigator.serviceWorker.register(swUrl, { scope: scopePath })
    .then(reg => {
      console.log('[HYS] Service Worker enregistré ✅', reg.scope);
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            store.addNotif({ type: 'info', message: 'Mise à jour disponible — rechargez la page pour l\'appliquer.' });
            updateNotifBadge();
          }
        });
      });
    })
    .catch(err => console.warn('[HYS] SW registration failed:', err.message));
}

function getSupaConfig() {

    if (raw && raw.disabled) return { url: '', key: '' };
    if (raw && raw.url && raw.key) return { url: raw.url, key: raw.key };
  } catch {}

}
function setSupaConfig(url, key) {

// ─── CLIENT SUPABASE LÉGER (sans SDK — fetch natif) ──────────────────────────
const SUPA_DISABLE_COOLDOWN_MS = 5 * 60 * 1000; // réessai auto après 5 min
const supa = {
  _failCount: 0,
  _disabled: false,   // coupe-circuit : plus d'appels après N échecs réseau consécutifs
  _disabledAt: 0,

  _check() {
    if (this._disabled) {
      // Cooldown écoulé (ex: projet Supabase qui vient de se réveiller après une
      // pause) → on redonne une chance plutôt que de rester bloqué toute la session.
      if (Date.now() - this._disabledAt > SUPA_DISABLE_COOLDOWN_MS) {
        this._disabled = false;
        this._failCount = 0;
      } else {
        return false;
      }
    }
    const { url, key } = getSupaConfig();
    return !!(url && key && /^https:\/\/.+\.supabase\.co$/.test(url));
  },

  _headers() {
    const { key } = getSupaConfig();
    return {
      'Content-Type':  'application/json',
      'apikey':        key,
      'Authorization': 'Bearer ' + key,
      'Prefer':        'return=representation',
    };
  },

  _onFailure(err) {
    this._failCount++;
    if (this._failCount >= SUPA_MAX_CONSECUTIVE_FAILURES) {
      this._disabled = true;
      this._disabledAt = Date.now();
      console.warn(`[Supa] ${this._failCount} échecs réseau consécutifs — synchronisation mise en pause (nouvelle tentative auto dans 5 min, ou immédiatement via Paramètres → Supabase).`);
      setSyncStatus('error');
    }
  },
  _onSuccess() { this._failCount = 0; },

  async select(table, filters = '') {
    if (!this._check()) return null;
    const { url: SUPA_URL } = getSupaConfig();
    try {
      const orderCol = (table === 'hysfood_soldes_cp' || table === 'hysfood_planning') ? 'userId' : (table === 'hysfood_settings' ? 'updatedAt' : 'createdAt');
      const url = `${SUPA_URL}/rest/v1/${table}?${filters}&order=${orderCol}.desc.nullslast`;
      const res = await fetch(url, { headers: this._headers() });
      if (!res.ok) { console.warn(`[Supa] SELECT ${table}:`, res.status); this._onFailure(); return null; }
      this._onSuccess();
      return await res.json();
    } catch(e) { console.warn('[Supa] SELECT error:', e.message); this._onFailure(e); return null; }
  },

  async upsert(table, rows) {
    if (!this._check()) return null;
    const { url: SUPA_URL } = getSupaConfig();
    try {
      let body = Array.isArray(rows) ? rows : [rows];
      // PostgREST refuse un batch dont les objets n'ont pas exactement les
      // mêmes clés (erreur "All object keys must match"). Comme nos objets JS
      // n'ont souvent que les clés effectivement renseignées (ex: un nouvel
      // utilisateur sans "pin" pendant qu'un autre l'a), on complète chaque
      // ligne avec toutes les clés de l'union, à null si absente.
      if (body.length > 1) {
        const allKeys = new Set();
        for (const r of body) for (const k in r) allKeys.add(k);
        body = body.map(r => {
          const full = {};
          for (const k of allKeys) full[k] = (k in r) ? r[k] : null;
          return full;
        });
      }
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: { ...this._headers(), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(body),
      });
      if (!res.ok) { const err = await res.text(); console.warn(`[Supa] UPSERT ${table}:`, err); this._onFailure(); return null; }
      this._onSuccess();
      return true;
    } catch(e) { console.warn('[Supa] UPSERT error:', e.message); this._onFailure(e); return null; }
  },

  async delete(table, id, pkCol = 'id') {
    if (!this._check()) return null;
    const { url: SUPA_URL } = getSupaConfig();
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${pkCol}=eq.${id}`, {
        method: 'DELETE', headers: this._headers(),
      });
      if (res.ok) this._onSuccess(); else this._onFailure();
      return res.ok;
    } catch(e) { console.warn('[Supa] DELETE error:', e.message); this._onFailure(e); return null; }
  },

  async rpc(fn, params = {}) {
    if (!this._check()) return null;
    const { url: SUPA_URL } = getSupaConfig();
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, {
        method: 'POST', headers: this._headers(), body: JSON.stringify(params),
      });
      if (!res.ok) { this._onFailure(); return null; }
      this._onSuccess();
      return await res.json();
    } catch(e) { this._onFailure(e); return null; }
  },

  isConfigured() { return this._check(); },
};

let _syncStatus = 'idle'; // idle | syncing | online | offline | error
let _lastSync   = null;
let _syncQueue  = []; // actions en attente offline

function setSyncStatus(status) {
  _syncStatus = status;
  renderSyncBadge();
}

function renderSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  const cfg = {
    idle:    { text: '⬤ Local',        color: 'var(--text3)' },
    syncing: { text: '↻ Sync…',         color: 'var(--amber)' },
    online:  { text: '⬤ En ligne',      color: 'var(--hys-green)' },
    offline: { text: '◌ Hors-ligne',    color: 'var(--amber)' },
    error:   { text: '⚠ Erreur sync',   color: 'var(--red)' },
    disabled:{ text: '⬤ Local uniquement', color: 'var(--text3)' },
  }[_syncStatus] || { text: '⬤ Local', color: 'var(--text3)' };
  el.textContent = cfg.text;
  el.style.color = cfg.color;
  if (_lastSync) {
    const ago = document.getElementById('sync-ago');
    if (ago) ago.textContent = 'Dernière sync : ' + timeAgo(_lastSync);
  }
}

// Pull depuis Supabase → localStorage
async function syncPull() {
  if (!supa.isConfigured() || !navigator.onLine) return false;
  // Attendre les envois en cours AVANT de tirer les données du serveur : sinon
  // un pull qui arrive juste après un push (ex: création d'un utilisateur) peut
  // écraser la donnée locale toute fraîche avec l'ancienne version serveur,
  // avant même que le push n'ait eu le temps d'aboutir — perte de données silencieuse.
  if (_pendingPushes.length) await Promise.allSettled(_pendingPushes);
  setSyncStatus('syncing');
  let ok = true;
  for (const m of SYNC_MAP) {
    const data = await supa.select(m.table);
    if (data !== null) {
      // Écriture directe (setter non patché) : ces données viennent DE Supabase,
      // pas besoin de les repousser aussitôt — l'ancien code créait une boucle
      // pull → push inutile à chaque cycle de 3 minutes.
      _storeSetOrig(m.sk, data);
      store.invalidate(m.sk);
    } else { ok = false; }
  }
  // Paramètres : ligne unique "global", pas un tableau de lignes
  const settingsRows = await supa.select('hysfood_settings');
  if (settingsRows !== null) {
    const row = settingsRows.find(r => r.id === 'global');
    if (row && row.data) {
      _storeSetOrig(SK.SETTINGS, row.data);
      store.invalidate(SK.SETTINGS);
    }
  } else { ok = false; }
  _lastSync = Date.now();
  setSyncStatus(ok ? 'online' : 'error');
  return ok;
}

// Push localStorage → Supabase (upsert)
async function syncPush(table, rows) {
  if (!supa.isConfigured()) return false;
  if (!navigator.onLine) {
    _syncQueue.push({ table, rows, ts: Date.now() });
    setSyncStatus('offline');
    return false;
  }
  const result = await supa.upsert(table, rows);
  if (result) { _lastSync = Date.now(); setSyncStatus('online'); }
  else setSyncStatus('error');
  return !!result;
}

// Drainer la file d'attente offline quand on revient en ligne
async function drainSyncQueue() {
  if (_syncQueue.length === 0) return;
  setSyncStatus('syncing');
  const failed = [];
  for (const item of _syncQueue) {
    const ok = await supa.upsert(item.table, item.rows);
    if (!ok) failed.push(item);
  }
  _syncQueue = failed;
  if (failed.length === 0) {
    setSyncStatus('online');
    toast('✅ Données synchronisées avec Supabase.', 'success');
  } else {
    setSyncStatus('error');
    toast(`⚠️ ${failed.length} opération(s) en attente de sync.`, 'warning');
  }
  _lastSync = Date.now();
}

// ─── PATCH DU STORE POUR WRITE-THROUGH ────────────────────────────────────────
// On surcharge saveUsers, savePointages, etc. pour pousser vers Supabase
// en plus d'écrire dans localStorage
const _storeSetOrig = store.set.bind(store);
// Envois en cours (fire-and-forget) — suivis pour que syncPull() puisse les
// attendre avant d'écraser le cache local (voir explication dans syncPull).
const _pendingPushes = [];
const _syncTableMap = {
  'hysfood_users':        'hysfood_users',
  'hysfood_pointages':    'hysfood_pointages',
  'hysfood_absences':     'hysfood_absences',
  'hysfood_soldes_cp':    'hysfood_soldes_cp',
  'hysfood_notifs':       'hysfood_notifications',
  'hysfood_audit':        'hysfood_audit',
  'hysfood_planning':     'hysfood_planning',
};

store.set = function(key, val) {
  const table = _syncTableMap[key];
  // Certaines tables utilisent "userId" comme clé primaire plutôt que "id"
  // (un enregistrement par salarié : soldes CP, planning).
  const pkCol = (table === 'hysfood_soldes_cp' || table === 'hysfood_planning') ? 'userId' : 'id';
  // Diffing AVANT d'écraser le cache : un upsert seul ne supprime jamais les
  // lignes retirées côté Supabase, et l'ancien code ignorait carrément les
  // tableaux vides (donc "tout supprimer" ne se synchronisait jamais).
  let removedIds = [];
  if (table && supa.isConfigured() && Array.isArray(val)) {
    const prevVal = store.get(key);
    if (Array.isArray(prevVal)) {
      const newIds = new Set(val.map(r => r && r[pkCol]).filter(Boolean));
      removedIds = prevVal.filter(r => r && r[pkCol] && !newIds.has(r[pkCol])).map(r => r[pkCol]);
    }
  }
  const result = _storeSetOrig(key, val);
  if (table && supa.isConfigured()) {
    if (Array.isArray(val) && val.length > 0) {
      // Push async, ne bloque pas l'UI — mais suivi pour que syncPull() puisse
      // attendre sa fin avant d'écraser localStorage avec les données serveur.
      const p = syncPush(table, val).catch(() => {});
      _pendingPushes.push(p);
      p.finally(() => { const i = _pendingPushes.indexOf(p); if (i >= 0) _pendingPushes.splice(i, 1); });
    }
    removedIds.forEach(id => { supa.delete(table, id, pkCol).catch(() => {}); });
  }
  // Paramètres : objet unique (pas un tableau de lignes) — stocké dans une
  // seule ligne "global" de hysfood_settings, contrairement aux autres tables.
  if (key === SK.SETTINGS && supa.isConfigured() && val && typeof val === 'object') {
    const p = syncPush('hysfood_settings', [{ id: 'global', data: val, updatedAt: new Date().toISOString() }]).catch(() => {});
    _pendingPushes.push(p);
    p.finally(() => { const i = _pendingPushes.indexOf(p); if (i >= 0) _pendingPushes.splice(i, 1); });
  }
  return result;
};

// ─── SYNC INDIVIDUELLE (pour un seul enregistrement) ─────────────────────────
async function syncRecord(table, record) {
  if (!supa.isConfigured()) return;
  if (!navigator.onLine) {
    _syncQueue.push({ table, rows: [record], ts: Date.now() });
    return;
  }
  await supa.upsert(table, [record]);
}
